<form method="post">
    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" name="title" class="form-control" required value="{{ task.title if task else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea name="description" class="form-control" rows="4">{{ task.description if task else '' }}</textarea>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Tipo</label>
            <select name="task_type" class="form-select" required>
                {% for item in task_types %}
                <option value="{{ item.value }}" {% if task and task.task_type.value == item.value %}selected{% endif %}>{{ item.value }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Status</label>
            <select name="status" class="form-select" required>
                {% for status in task_statuses %}
                <option value="{{ status.value }}" {% if task and task.status.value == status.value %}selected{% endif %}>{{ status.value }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Prioridade</label>
            <select name="priority" class="form-select" required>
                {% for priority in priorities %}
                <option value="{{ priority.value }}" {% if task and task.priority.value == priority.value %}selected{% endif %}>{{ priority.value }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row g-3 mt-1">
        <div class="col-md-6">
            <label class="form-label">Data</label>
            <input type="date" name="due_date" class="form-control" value="{{ task.due_date.isoformat() if task and task.due_date else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Horário do alerta</label>
            <input type="time" name="alert_time" class="form-control" value="{{ task.alert_time.strftime('%H:%M') if task and task.alert_time else '' }}">
        </div>
    </div>

    <div class="form-check my-3">
        <input class="form-check-input" type="checkbox" name="is_recurring" id="is_recurring" {% if task and task.is_recurring %}checked{% endif %}>
        <label class="form-check-label" for="is_recurring">
            Tarefa recorrente
        </label>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Salvar</button>
        <a href="/" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>
